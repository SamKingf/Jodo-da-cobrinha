<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manutenção | Jogo da Cobrinha</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0c111d;
            color: #f8fafc;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }
        .container {
            padding: 40px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 24px;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h1 { color: #10b981; font-size: 32px; margin-bottom: 10px; }
        p { color: #94a3b8; line-height: 1.6; margin-bottom: 25px; }
        .icon { font-size: 60px; margin-bottom: 20px; display: block; }
        .status-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 20px;
        }
        .progress {
            width: 50%;
            height: 100%;
            background: #10b981;
            animation: load 2s infinite ease-in-out;
        }
        @keyframes load {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="icon">🛠️</span>
        <h1>Em Manutenção</h1>
        <p>Estamos trabalhando nos bastidores para polir a jogabilidade e eliminar alguns bugs. Em breve, a arena estará aberta novamente para você!</p>
        <div class="status-bar"><div class="progress"></div></div>
    </div>

</body>
</html>
