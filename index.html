<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Arena em Manutenção</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0c111d;
            color: #f8fafc;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            padding: 40px;
            background: rgba(239, 68, 68, 0.1);
            backdrop-filter: blur(20px);
            border: 2px solid #ef4444;
            border-radius: 24px;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        h1 { color: #ef4444; font-size: 28px; margin-bottom: 15px; text-transform: uppercase; }
        p { color: #cbd5e1; font-size: 16px; line-height: 1.6; }
        .emoji { font-size: 50px; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <span class="emoji">🐍😵</span>
        <h1>O jogo entortou!</h1>
        <p>A gente tentou dar aquela melhorada no multiplayer, mas o código acabou se enrolando todo e o jogo deu um bug.</p>
        <p>Estou aqui na correria pra desatar esses nós e colocar a arena de volta nos eixos. Já já a gente volta ao normal!</p>
    </div>

</body>
</html>
